# Render Blueprint — public HTTPS deployment of OBV.
# Deploy: render.com → New → Blueprint → connect this repo → Apply.
#
# Host selection (compatibility, not popularity):
# - OBV is ONE long-running node:http process using the built-in
#   node:sqlite and local-disk storage — it needs a real server process,
#   Node >= 22.5, and writable disk. Serverless platforms (Vercel/Netlify
#   functions) are architecturally incompatible: no long-lived process,
#   no persistent local writes, request time limits vs. PDF rendering.
# - PDF report generation needs headless Chromium + system libraries,
#   which Render's native Node runtime does not provide. The Docker
#   runtime below bakes Playwright + Chromium into the image, so reports
#   render as real PDFs in production. Render Docker works on the free
#   plan and terminates HTTPS automatically (required for phone camera
#   and geolocation APIs).
#
# Persistence:
# - Free plan disks are ephemeral: every restart/redeploy returns the demo
#   to its seeded state (the start command reseeds only when the database
#   file is missing — often acceptable, even desirable, for a demo).
# - For restart-safe state, upgrade the instance (disks need a paid plan),
#   uncomment the disk block below, and set OBV_DATA_DIR=/var/data.
services:
  - type: web
    name: obv-demo
    runtime: docker
    plan: free
    branch: claude/obv-demo-repo-structure-t0hjsc
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      # Optional access protection for the public demo. Set a value in the
      # Render dashboard (sync: false means Render prompts; leaving it
      # empty keeps the demo open).
      - key: OBV_ACCESS_CODE
        sync: false
      # Optional integrations — set values in the Render dashboard only;
      # never commit them to the repository:
      #   ANTHROPIC_API_KEY   -> enables live AI visual verification
      #   TEAMS_WEBHOOK_URL   -> enables Microsoft Teams notifications
      #   OBV_PUBLIC_BASE_URL -> explicit public URL for Teams card links
      #                          (defaults to Render's RENDER_EXTERNAL_URL)
    # ---- persistent storage (requires a paid instance type) ----
    # disk:
    #   name: obv-data
    #   mountPath: /var/data
    #   sizeGB: 1
    # ...and add:
    # envVars:
    #   - key: OBV_DATA_DIR
    #     value: /var/data

  # ---- FRONTEND PREVIEW (separate URL; never production) -------------
  # Deploys the frontend-reconstruction branch under its own URL
  # (https://obv-frontend-preview.onrender.com once created). OBV_PREVIEW=1
  # turns on the preview banner; production never sets it. To create this
  # service: Render dashboard → New → Blueprint (or "New → Web Service",
  # branch claude/obv-frontend-reconstruction, Docker runtime) → Apply.
  - type: web
    name: obv-frontend-preview
    runtime: docker
    plan: free
    branch: claude/obv-frontend-reconstruction
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: OBV_PREVIEW
        value: "1"
      - key: OBV_ACCESS_CODE
        sync: false
